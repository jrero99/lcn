<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="La Casa Nostra — bocadillería en Mataró. Carta, pedidos online y reservas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>La Casa Nostra · Bocadillería Mataró</title>
    <!--
      Google Identity Services (GIS) — loaded here so it is available before
      any React component mounts. `async` ensures the page is not blocked.
      GoogleSignInButton.jsx also handles the case where the script has not
      finished loading yet (waits for the onload event before initializing).
      This tag is safe to have even if VITE_GOOGLE_CLIENT_ID is not set —
      the component will simply not render the button.
    -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
