name: Deploy frontend to GitHub Pages

# Construye el SPA de React (carpeta frontend/) y lo publica en GitHub Pages.
# Se ejecuta en cada push a main y también se puede lanzar a mano.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados; deja terminar el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: GitHub Pages no conoce las rutas de React Router
      # (p.ej. /lcn/hacer-pedido). Servir index.html también como 404.html
      # permite recargar o entrar directo a una ruta profunda.
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
